<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1C1B1E">
<title>BOUN · Análisis ML</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="BOUN">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<!-- Login -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <img src="/logo.png" class="login-logo" alt="BOUN">
    <h2>Iniciar sesión</h2>
    <div class="sub">Ingresa con tu cuenta del equipo BOUN.</div>
    <div id="loginErr" class="err"></div>
    <input id="lu" class="field" placeholder="Correo / usuario" autocomplete="username">
    <input id="lp" class="field" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div id="app" class="app">

  <!-- Barra superior (solo móvil) -->
  <header class="mtopbar">
    <button class="mham" onclick="mToggleNav()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
    <img src="/logo.png" class="mtoplogo" alt="BOUN">
    <div class="mtoptag" id="mtoptag"></div>
  </header>

  <!-- Backdrop del menú -->
  <div id="mbackdrop" class="mbackdrop" onclick="mCloseNav()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <img src="/logo.png" alt="BOUN">
      <div class="tag">Análisis MercadoLibre</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="userbox">
      <div class="uname" id="uname">—</div>
      <div class="urole" id="urole"></div>
      <button onclick="doLogout()">Cerrar sesión</button>
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>

<!-- Modal genérico -->
<div id="modalBg" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal" class="modal"></div>
</div>

<script src="/app.js"></script>
<script>
/* ── Menú móvil (drawer) ─────────────────────────────────────────────── */
function mToggleNav(){
  var s=document.getElementById('sidebar'), b=document.getElementById('mbackdrop');
  var open=s.classList.toggle('open'); b.classList.toggle('open',open);
  document.body.classList.toggle('mnav-open',open);
}
function mCloseNav(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mbackdrop').classList.remove('open');
  document.body.classList.remove('mnav-open');
}
/* Cerrar el menú al elegir una sección */
document.addEventListener('click',function(e){
  if(e.target.closest('#nav a')) mCloseNav();
});
/* Reflejar la sección activa en la barra superior */
function mSyncTag(){
  var a=document.querySelector('#nav a.active'), t=document.getElementById('mtoptag');
  if(a&&t) t.textContent=a.textContent.replace(/[^\wáéíóúñÁÉÍÓÚÑ ]/g,'').trim();
}
new MutationObserver(mSyncTag).observe(document.documentElement,{subtree:true,attributes:true,attributeFilter:['class']});
/* Cerrar al pasar a escritorio */
window.addEventListener('resize',function(){ if(window.innerWidth>820) mCloseNav(); });
</script>
</body>
</html>
